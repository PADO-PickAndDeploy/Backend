spring.application.name=backend

# 데이터베이스 연결 설정
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

spring.data.mongodb.uri=mongodb://${MONGO_USER}:${MONGO_PASS}@${MONGO_HOST}:${MONGO_PORT}/${MONGO_DB_NAME}?authSource=admin

# Redis 설정 (개발환경 - 로컬)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=${REDIS_TIMEOUT:2000ms}

# JPA 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 몽고디비 로그 없애기
logging.level.org.springframework.data.mongodb=warn
logging.level.org.mongodb.driver=warn

# gRPC 클라이언트 설정 (provisioning-service라는 이름으로 주입)
grpc.client.provisioning-service.address=static://host.docker.internal:50051
grpc.client.provisioning-service.negotiationType=plaintext

# Vault 개발 환경 설정
vault.enabled=${VAULT_ENABLED:true}
vault.host=${VAULT_HOST:localhost}
vault.port=${VAULT_PORT:8200}
vault.scheme=${VAULT_SCHEME:http}
vault.token=${VAULT_TOKEN:pado-dev-token}
vault.kv-path=${VAULT_KV_PATH:secret/pado-dev}

# Vault 관련 로깅 (개발환경에서만)
logging.level.com.pado.backend.global.vault=DEBUG
logging.level.org.springframework.vault=DEBUG