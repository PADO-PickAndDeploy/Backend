spring.application.name=backend

# 데이터베이스 연결 설정
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

spring.data.mongodb.uri=mongodb://${MONGO_USER}:${MONGO_PASS}@${MONGO_HOST}:${MONGO_PORT}/${MONGO_DB_NAME}?authSource=admin

# TODO : Redis 설정 
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=${REDIS_TIMEOUT:2000ms}

# JPA 설정
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# gRPC 클라이언트 설정 (provisioning-service라는 이름으로 주입)
grpc.client.provisioning-service.address=static://host.docker.internal:50051
grpc.client.provisioning-service.negotiationType=plaintext

# 운영 환경에서 스웨거 비활성화
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# TODO : Vault 설정
vault.enabled=${VAULT_ENABLED}
vault.host=${VAULT_HOST}
vault.port=${VAULT_PORT}
vault.scheme=${VAULT_SCHEME}
vault.token=${VAULT_TOKEN}
vault.kv-path=${VAULT_KV_PATH}

# 운영 환경 Vault 로깅
logging.level.com.pado.backend.global.vault=ERROR
logging.level.org.springframework.vault=ERROR